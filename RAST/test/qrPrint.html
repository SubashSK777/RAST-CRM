<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title></title>
    <script type="text/javascript" src="/QRGen/jquery.min.js"></script>
    <script type="text/javascript" src="/QRGen/qrcode.js"></script>
</head>
<body>
    
    <input id="text" type="text" value="https://hogangnono.com" style="width:80%" /><br />
    
    <div id="qrcode" style="width:100px; height:100px; margin-top:15px;"></div>
    <script type="text/javascript">


var qrcode = new QRCode(document.getElementById("qrcode"), {
	width : 100,
	height : 100
});

function makeCode () {
	var elText = document.getElementById("text");

	if (!elText.value) {
		alert("Input a text");
		elText.focus();
		return;
	}

	qrcode.makeCode(elText.value);
}

makeCode();

$("#text").
	on("blur", function () {
		makeCode();
	}).
	on("keydown", function (e) {
		if (e.keyCode == 13) {
			makeCode();
		}
	});

</body>
</html>
